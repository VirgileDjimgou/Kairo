server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # Static assets with long cache (fingerprinted by Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA service worker — must not be cached aggressively
    location = /sw.js {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Service-Worker-Allowed "/";
    }

    # PWA manifest
    location = /manifest.webmanifest {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        types { application/manifest+json webmanifest; }
    }

    # PWA registration script
    location = /registerSW.js {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # API proxy to backend (same-origin)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health check proxy
    location /health {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Metrics proxy for production smoke checks and operator validation
    location /metrics {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Keep the API surface small on the public entrypoint in production.
    location = /docs { return 404; }
    location = /redoc { return 404; }
    location = /openapi.json { return 404; }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
