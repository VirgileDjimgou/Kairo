# Production override for docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# This override:
#   - Switches web and api to production targets
#   - Removes volume mounts (source is baked into images)
#   - Runs api with 2 uvicorn workers
#   - Disables debug/docs endpoints

services:
  web:
    build:
      target: production
      args:
        VITE_API_BASE_URL: /api/v1
    ports: !override
      - "80:80"
    volumes: !reset []
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - APP_DEBUG=false
      - VITE_API_BASE_URL=/api/v1

  api:
    build:
      target: production
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes: !reset []
    ports: !reset []

  worker:
    build:
      target: production
    volumes: !reset []
    ports: !reset []
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  qdrant:
    ports: !reset []

  minio:
    ports: !reset []

  ollama:
    ports: !reset []
