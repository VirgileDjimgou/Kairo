[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "UP", "S"]
ignore = [
    "S101",   # assert in tests is fine
    "S105",   # allow hardcoded passwords in tests/seeds
    "S106",   # same
    "B008",   # FastAPI depends() pattern is fine
    "N818",   # exception names
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "E501"]
"app/db/seed.py" = ["S105", "S106"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
no_strict_optional = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: integration tests requiring PostgreSQL",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]
