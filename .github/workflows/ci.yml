name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: API — Quality Baseline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/api/requirements.txt

      - name: Install API dependencies
        run: pip install -r services/api/requirements.txt

      - name: Lint selected backend baseline (ruff)
        run: >
          python -m ruff check
          services/api/app/core/dependencies.py
          services/api/app/core/security.py
          services/api/app/core/authorization.py
          services/api/app/modules/rag/policy.py
          services/api/tests/conftest.py
          services/api/tests/test_chat.py
          services/api/tests/test_governance_roles.py

      - name: Type check selected backend baseline (mypy)
        run: >
          python -m mypy --config-file services/api/pyproject.toml --explicit-package-bases
          services/api/app/core/dependencies.py
          services/api/app/core/security.py
          services/api/app/core/authorization.py
          services/api/app/modules/rag/policy.py

      - name: Run backend tests from repository root
        env:
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          APP_ENV: test
        run: python -m pytest services/api/tests -q

  web:
    name: Web — Type, Build, And Browser Baseline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Type check
        run: |
          cd apps/web
          npm run type-check

      - name: Build
        run: |
          cd apps/web
          npm run build

      - name: Install Playwright browser
        run: |
          cd apps/web
          npx playwright install --with-deps chromium

      - name: Run localization browser regression pack
        run: |
          cd apps/web
          npm run test:e2e:locale
