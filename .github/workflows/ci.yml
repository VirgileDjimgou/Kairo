name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: API — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orgmind_test
          POSTGRES_USER: orgmind
          POSTGRES_PASSWORD: orgmind_dev_password
        options: >-
          --health-cmd "pg_isready -U orgmind -d orgmind_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/api/requirements.txt

      - name: Install API dependencies
        run: |
          cd services/api
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          cd services/api
          ruff check app tests

      - name: Type check (mypy)
        run: |
          cd services/api
          mypy app --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Test
        env:
          TEST_DATABASE_URL: postgresql+psycopg://orgmind:orgmind_dev_password@localhost:5432/orgmind_test
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          APP_ENV: test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd services/api
          pytest tests/ -v --tb=short

  web:
    name: Web — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Type check
        run: |
          cd apps/web
          npm run type-check

      - name: Build
        run: |
          cd apps/web
          npm run build
